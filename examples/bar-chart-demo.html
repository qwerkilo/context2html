<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 条形图 - 组件示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --radius: 8px; }
body { font-family: "Noto Serif CJK SC", Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.8; max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5em; }

.bar-chart { margin: 1.2rem 0; }
.bar-item { display: flex; align-items: center; margin: 0.5em 0; }
.bar-label { width: 100px; flex-shrink: 0; font-size: 0.85rem; text-align: right; padding-right: 0.8em; color: #555; }
.bar-track { flex: 1; height: 1.6em; background: #eee; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding: 0 0.5em; font-size: 0.78rem; color: #fff; font-weight: 600; min-width: 2.5em; justify-content: flex-end; }
</style>
</head>
<body>

<h1 class="shiny-text">CSS 条形图 — 组件示例</h1>

<p>归一化百分比展示各国应对刺激规模对比，颜色语义区分类别。</p>

<div class="bar-chart border-glow" style="padding:1rem;border-radius:var(--radius,8px);">
  <div class="bar-item">
    <div class="bar-label">美国</div>
    <div class="bar-track"><div class="bar-fill" style="width:100%; background:#2563eb;">7,000亿</div></div>
  </div>
  <div class="bar-item">
    <div class="bar-label">中国</div>
    <div class="bar-track"><div class="bar-fill" style="width:80%; background:#16a34a;">5,860亿</div></div>
  </div>
  <div class="bar-item">
    <div class="bar-label">欧盟</div>
    <div class="bar-track"><div class="bar-fill" style="width:55%; background:#2563eb;">4,000亿</div></div>
  </div>
  <div class="bar-item">
    <div class="bar-label">日本</div>
    <div class="bar-track"><div class="bar-fill" style="width:45%; background:#2563eb;">3,300亿</div></div>
  </div>
  <div class="bar-item">
    <div class="bar-label">英国</div>
    <div class="bar-track"><div class="bar-fill" style="width:30%; background:#d97706;">2,200亿</div></div>
  </div>
</div>

</body>
</html>
