<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热力图 - 组件示例</title>
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --radius: 8px; }
body { font-family: "Noto Serif CJK SC", Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.8; max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5em; }

.shiny-text { background: linear-gradient(110deg, var(--text) 30%, var(--accent) 50%, var(--text) 70%); background-size: 200% 100%; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s cubic-bezier(0.6,0.6,0,1) infinite; }
@keyframes shine { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
@media (prefers-reduced-motion: reduce) { .shiny-text { background: none; -webkit-text-fill-color: unset; } }

.heatmap-wrap { position: relative; margin: 1.5rem 0; border-radius: var(--radius); overflow: hidden; }
.hm-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5em; color: var(--text); }
.hm-canvas { position: relative; display: block; width: 100%; height: auto; }
.hm-legend { display: flex; align-items: center; justify-content: flex-end; gap: 0; margin-top: 0.5em; height: 14px; border-radius: 3px; overflow: hidden; width: 200px; margin-left: auto; }
.hm-legend-bar { flex: 1; height: 100%; }
.hm-legend-label { font-size: 0.72rem; color: #888; white-space: nowrap; }
.hm-legend-label:first-child { margin-right: 6px; }
.hm-legend-label:last-child { margin-left: 6px; }
.hm-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.3em; }
.hm-note { font-size: 0.75rem; color: #999; }
</style>
</head>
<body>

<h1 class="shiny-text">热力图 — 密度可视化</h1>

<p>颜色深度反映数值大小：从<strong>浅</strong>（低）到<strong>深</strong>（高），连续渐变无断点。</p>

<div class="heatmap-wrap">
  <div class="hm-title">城市月度气温异常值 (℃) — 2024 年</div>
  <canvas id="hmCanvas" class="hm-canvas"></canvas>
  <div class="hm-footer">
    <span class="hm-note">数据来源：气象模拟数据</span>
    <div class="hm-legend">
      <span class="hm-legend-label">低</span>
      <div class="hm-legend-bar" id="hmLegendBar"></div>
      <span class="hm-legend-label">高</span>
    </div>
  </div>
</div>

<script>
(function(){
  var data = [
    [-0.8,-0.5, 1.2, 2.8, 4.5, 6.2, 7.8, 7.5, 5.3, 3.0, 1.0,-0.3],
    [-2.5,-1.8, 0.5, 3.0, 5.8, 8.5,10.2, 9.8, 6.5, 3.2, 0.2,-1.5],
    [-5.0,-3.5,-0.2, 4.0, 7.5,11.0,13.5,12.8, 8.5, 4.2, 0.5,-3.0],
    [-8.5,-6.0,-1.5, 3.5, 7.0,10.5,13.0,12.2, 8.0, 3.5,-1.0,-5.5],
    [-12.0,-9.5,-4.0, 2.0, 6.5,10.0,12.5,11.8, 7.0, 2.0,-3.5,-9.0],
    [-16.0,-13.0,-7.0, 0.5, 5.0, 8.5,11.0,10.2, 5.5, 0.0,-6.0,-12.5],
    [-20.0,-16.5,-9.5,-2.0, 3.0, 6.5, 9.0, 8.2, 3.5,-2.0,-9.0,-16.0],
    [-24.0,-20.5,-13.0,-4.5, 1.0, 4.5, 7.0, 6.2, 1.5,-4.0,-12.0,-19.5],
    [-28.0,-24.0,-16.0,-7.0,-0.5, 3.0, 5.5, 4.8, 0.0,-6.0,-15.0,-23.0],
  ];
  var rowLabels = ['海口','广州','昆明','上海','北京','哈尔滨','漠河','拉萨','那曲'];
  var colLabels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  var vmin = Infinity, vmax = -Infinity;
  for (var r = 0; r < data.length; r++)
    for (var c = 0; c < data[r].length; c++) {
      if (data[r][c] < vmin) vmin = data[r][c];
      if (data[r][c] > vmax) vmax = data[r][c];
    }

  function normalize(v) { return (v - vmin) / (vmax - vmin); }

  function heatColor(v) {
    var n = normalize(v);
    var r, g, b;
    if (n < 0.5) {
      var t = n * 2; /* deep blue → white */
      r = 30  + t * 225;  /* 30 → 255 */
      g = 80  + t * 175;  /* 80 → 255 */
      b = 180 + t * 75;   /* 180 → 255 */
    } else {
      var t = (n - 0.5) * 2; /* white → deep red */
      r = 255 - t * 70;  /* 255 → 185 */
      g = 255 - t * 227; /* 255 → 28 */
      b = 255 - t * 227; /* 255 → 28 */
    }
    return 'rgb(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ')';
  }

  var canvas = document.getElementById('hmCanvas');
  var dpr = window.devicePixelRatio || 1;
  var cols = colLabels.length;
  var rows = data.length;
  var cellW = 52, cellH = 32, padL = 54, padT = 32, gap = 1;

  var W = padL + cols * cellW + gap;
  var H = padT + rows * cellH + gap;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  function drawHeatmap() {
    ctx.clearRect(0, 0, W, H);

    /* row labels */
    ctx.font = '11px "Noto Serif CJK SC",Georgia,serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (var r = 0; r < rows; r++) {
      ctx.fillStyle = '#555';
      ctx.fillText(rowLabels[r], padL - 6, padT + r * cellH + cellH / 2);
    }

    /* col labels */
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    for (var c = 0; c < cols; c++) {
      ctx.fillStyle = '#555';
      ctx.fillText(colLabels[c], padL + c * cellW + cellW / 2, padT - 4);
    }

    /* cells */
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var v = data[r][c];
        var x = padL + c * cellW;
        var y = padT + r * cellH;
        ctx.fillStyle = heatColor(v);
        ctx.fillRect(x, y, cellW - gap, cellH - gap);

        var mid = Math.abs(normalize(v) - 0.5);
        ctx.fillStyle = mid > 0.2 ? '#fff' : '#1a202c';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(v.toFixed(1), x + (cellW - gap) / 2, y + (cellH - gap) / 2);
      }
    }
  }

  drawHeatmap();

  /* legend gradient bar */
  (function(){
    var bar = document.getElementById('hmLegendBar');
    var stops = [];
    for (var i = 0; i <= 20; i++) {
      var t = i / 20;
      var v = vmin + t * (vmax - vmin);
      stops.push(heatColor(v) + ' ' + (t * 100) + '%');
    }
    bar.style.background = 'linear-gradient(to right,' + stops.join(',') + ')';
  })();

  /* highlight today's column */
  (function(){
    var today = new Date();
    var m = today.getMonth();
    if (m >= 0 && m < cols) {
      var x = padL + m * cellW;
      ctx.strokeStyle = 'rgba(200,50,50,0.6)';
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, padT + 1, cellW - gap - 2, rows * cellH - gap - 2);
    }
  })();
})();
</script>
</body>
</html>
