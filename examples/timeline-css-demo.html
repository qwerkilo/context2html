<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 时间线 - 组件示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --radius: 8px; }
body { font-family: "Noto Serif CJK SC", Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.8; max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5em; }

.timeline { position: relative; padding: 1em 0; margin: 1.5rem 0; }
.timeline::before { content: ''; position: absolute; left: 18px; top: 0; bottom: 0; width: 2px; background: #d0d0d0; }
.tl-item { position: relative; padding: 0.6em 0 0.6em 3em; }
.tl-dot { position: absolute; left: 10px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 3px solid var(--bg); z-index: 1; transition: box-shadow 0.2s ease, transform 0.2s ease; }
.tl-dot.major { width: 22px; height: 22px; left: 8px; }
.tl-item:hover .tl-dot { box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 25%, transparent); transform: scale(1.15); }
.tl-date { font-size: 0.8rem; font-weight: 700; color: var(--accent); }
.tl-desc { font-size: 0.9rem; margin-top: 0.1em; }
</style>
</head>
<body class="dot-bg">

<h1 class="shiny-text">CSS 时间线 — 组件示例</h1>

<p>纯 CSS 竖直时间轴，关键事件使用放大的圆点。</p>

<div class="timeline">
  <div class="tl-item">
    <div class="tl-dot major"></div>
    <div class="tl-date">2007 年中</div>
    <div class="tl-desc">美国房价见顶，次贷违约率开始上升</div>
  </div>
  <div class="tl-item">
    <div class="tl-dot"></div>
    <div class="tl-date">2008.03</div>
    <div class="tl-desc">贝尔斯登被摩根大通收购</div>
  </div>
  <div class="tl-item">
    <div class="tl-dot major"></div>
    <div class="tl-date">2008.09.15</div>
    <div class="tl-desc"><strong>雷曼兄弟破产</strong> — 全球信贷冻结</div>
  </div>
  <div class="tl-item">
    <div class="tl-dot"></div>
    <div class="tl-date">2008.10</div>
    <div class="tl-desc">TARP 7000亿美元救助计划获批</div>
  </div>
  <div class="tl-item">
    <div class="tl-dot"></div>
    <div class="tl-date">2009.03</div>
    <div class="tl-desc">美股触底，美联储启动QE1</div>
  </div>
</div>

</body>
</html>
