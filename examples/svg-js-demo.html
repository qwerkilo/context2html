<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG.js 动态图表 — 示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<!-- 优先本地文件，CDN 作为 fallback -->
<script src="../libs/svg.min.js"></script>
<script>if(typeof SVG==='undefined'){document.write('<script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2.4/dist/svg.min.js"><\/script>')}</script>
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --surface: #f5f0eb; --border: #ddd8d0; --muted: #888; --accent-text: #ffffff; --chart-1: #c0392b; --chart-2: #e67e22; --chart-3: #2980b9; --chart-4: #27ae60; --radius: 8px; }
body { font-family: "Noto Serif CJK SC",Georgia,serif; background: var(--bg); color: var(--text); max-width: 880px; margin: 0 auto; padding: 2rem; }
h1 { text-wrap: pretty; border-bottom: 2px solid var(--accent); padding-bottom: 0.5em; }
h2 { margin-top: 2em; text-wrap: pretty; }
.chart-box { background: var(--surface); border-radius: var(--radius); margin: 1rem 0; padding: 8px; }
.no-js-fallback { display: none; text-align: center; padding: 2rem; color: var(--muted); }
.ring-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.ring-row > div { flex: 0 0 auto; }
.label { text-align: center; font-size: 0.85rem; color: var(--muted); margin-top: 0.5em; }
</style>
</head>
<body>

<h1 class="shiny-text">SVG.js 动态图表</h1>
<p>轻量级 SVG 动画库（~78KB）。4 个子组件演示：柱状图、折线图、流程图、进度环。</p>

<h2>31a — 动态柱状图</h2>
<div class="chart-box border-glow"><div id="svgjs-bar" style="width:100%;height:300px;"></div></div>
<p class="label">各国 GDP（千亿美元）</p>

<h2>31b — 多系列折线图</h2>
<div class="chart-box border-glow"><div id="svgjs-line" style="width:100%;height:300px;"></div></div>
<p class="label">实际 vs 预测（6 个月）</p>

<h2>31c — 流程图</h2>
<div class="chart-box border-glow"><div id="svgjs-flow" style="width:100%;height:220px;"></div></div>
<p class="label">数据处理流程</p>

<h2>31d — 进度环</h2>
<div class="ring-row">
  <div><div id="svgjs-ring-1" style="width:200px;height:200px;"></div><p class="label">完成率 73%</p></div>
  <div><div id="svgjs-ring-2" style="width:200px;height:200px;"></div><p class="label">覆盖率 91%</p></div>
  <div><div id="svgjs-ring-3" style="width:200px;height:200px;"></div><p class="label">满意度 47%</p></div>
</div>

<div class="no-js-fallback"><p>图表加载需要 JavaScript</p></div>

<script>
function gv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()}
document.addEventListener('DOMContentLoaded', function(){
  if(typeof SVG === 'undefined') return;

  // ========== 31a 柱状图 ==========
  (function(){
    var el = document.getElementById('svgjs-bar');
    if(!el) return;
    var data = [
      { label: '中国', value: 17.7 },
      { label: '美国', value: 25.5 },
      { label: '日本', value: 4.2 },
      { label: '德国', value: 4.0 },
      { label: '英国', value: 3.3 }
    ];
    var palette = [gv('--chart-1'), gv('--chart-2'), gv('--chart-3'), gv('--chart-4')];
    var W = 600, H = 280, PAD = 40;
    var chartH = H - PAD * 2;
    var maxVal = Math.max.apply(null, data.map(function(d){return d.value;}));
    var bw = (W - PAD * 2) / data.length * 0.7;
    var gap = (W - PAD * 2) / data.length * 0.3;

    var draw = SVG().addTo('#svgjs-bar').size(W, H);
    draw.viewbox(0, 0, W, H);
    draw.line(PAD, H - PAD, W - PAD, H - PAD).stroke({ color: gv('--border'), width: 1 });
    draw.line(PAD, PAD, PAD, H - PAD).stroke({ color: gv('--border'), width: 1 });

    data.forEach(function(d, i) {
      var x = PAD + i * (bw + gap) + gap / 2;
      var h = (d.value / maxVal) * chartH;
      var y = H - PAD - h;
      var rect = draw.rect(bw, 0).move(x, H - PAD)
        .fill(palette[i % palette.length]).radius(4).attr('opacity', 0.9);
      rect.animate(900, i * 100, 'now').during(function(t) {
        this.size(bw, t * h).move(x, H - PAD - t * h);
      });
      draw.text(d.label).move(x + bw / 2 - 12, H - PAD + 8)
        .font({ size: 12, family: 'sans-serif' }).fill(gv('--muted'));
      draw.text(String(d.value)).move(x + bw / 2 - 8, y - 16)
        .font({ size: 11, weight: 700 }).fill(gv('--text'));
    });
  })();

  // ========== 31b 折线图 ==========
  (function(){
    var el = document.getElementById('svgjs-line');
    if(!el) return;
    var series = [
      { name: '实际', color: gv('--chart-1'), data: [3, 5, 8, 4, 9, 6] },
      { name: '预测', color: gv('--chart-2'), data: [null, null, null, 4, 7, 8] }
    ];
    var W = 600, H = 280, PAD = 40;
    var maxV = 10, minV = 0;
    var chartH = H - PAD * 2;
    var stepX = (W - PAD * 2) / (series[0].data.length - 1);
    var draw = SVG().addTo('#svgjs-line').size(W, H);
    draw.viewbox(0, 0, W, H);

    for (var i = 0; i <= 5; i++) {
      var y = PAD + chartH * i / 5;
      draw.line(PAD, y, W - PAD, y).stroke({ color: gv('--border'), width: 0.5, dasharray: '2,4' });
    }

    series.forEach(function(s, si) {
      var path = '';
      s.data.forEach(function(v, i) {
        if (v == null) return;
        var x = PAD + i * stepX;
        var y = H - PAD - (v - minV) / (maxV - minV) * chartH;
        path += (path ? 'L' : 'M') + x + ',' + y + ' ';
      });
      if (path) {
        var line = draw.path(path).fill('none')
          .stroke({ color: s.color, width: 2.5, linecap: 'round', linejoin: 'round' });
        if (si === 1) line.attr('stroke-dasharray', '6,4');
        s.data.forEach(function(v, i) {
          if (v == null) return;
          var x = PAD + i * stepX;
          var y = H - PAD - (v - minV) / (maxV - minV) * chartH;
          draw.circle(5).center(x, y).fill(s.color)
            .attr('stroke', gv('--bg')).attr('stroke-width', 2);
        });
      }
    });
  })();

  // ========== 31c 流程图 ==========
  (function(){
    var el = document.getElementById('svgjs-flow');
    if(!el) return;
    var nodes = [
      { x: 80,  y: 110, label: '输入',   color: gv('--chart-3') },
      { x: 280, y: 110, label: '处理',   color: gv('--chart-1') },
      { x: 480, y: 110, label: '校验',   color: gv('--chart-2') },
      { x: 680, y: 110, label: '输出',   color: gv('--chart-4') }
    ];
    var W = 760, H = 220;
    var draw = SVG().addTo('#svgjs-flow').size(W, H);
    draw.viewbox(0, 0, W, H);

    for (var i = 0; i < nodes.length - 1; i++) {
      var a = nodes[i], b = nodes[i + 1];
      var line = draw.line(a.x + 60, a.y, b.x - 60, b.y)
        .stroke({ color: gv('--border'), width: 2 });
      line.attr('stroke-dasharray', '0,200');
      line.animate(800, 200 + i * 200, 'now').ease('>').attr('stroke-dasharray', '200,0');
    }

    nodes.forEach(function(n, i) {
      var g = draw.group();
      var rect = g.rect(120, 60).move(n.x - 60, n.y - 30)
        .fill(n.color).radius(8).attr('opacity', 0);
      rect.animate(500, i * 200, 'now').attr('opacity', 1);
      var txt = g.text(n.label).center(n.x, n.y)
        .font({ size: 14, weight: 700, family: 'sans-serif' })
        .fill(gv('--accent-text')).attr('opacity', 0);
      txt.animate(500, i * 200 + 100, 'now').attr('opacity', 1);
    });
  })();

  // ========== 31d 进度环 ==========
  (function(){
    var ringData = [
      { id: 'svgjs-ring-1', pct: 73 },
      { id: 'svgjs-ring-2', pct: 91 },
      { id: 'svgjs-ring-3', pct: 47 }
    ];
    ringData.forEach(function(rd) {
      var el = document.getElementById(rd.id);
      if(!el) return;
      var pct = rd.pct;
      var size = 180, strokeW = 14, r = (size - strokeW) / 2;
      var cx = size / 2, cy = size / 2;

      function arcPath(p) {
        var angle = (p / 100) * 2 * Math.PI - Math.PI / 2;
        var x = cx + r * Math.cos(angle);
        var y = cy + r * Math.sin(angle);
        var large = p > 50 ? 1 : 0;
        return ['M', cx, cy - r, 'A', r, r, 0, large, 1, x, y].join(' ');
      }

      var draw = SVG().addTo(el).size(size, size);
      draw.viewbox(0, 0, size, size);
      draw.circle(r * 2).center(cx, cy).fill('none').stroke({ color: gv('--border'), width: strokeW });
      var arc = draw.path(arcPath(0)).fill('none')
        .stroke({ color: gv('--accent'), width: strokeW, linecap: 'round' });
      arc.animate(1400, 0, 'now').ease('>').plot(arcPath(pct));
      draw.text(String(pct) + '%').center(cx, cy)
        .font({ size: 32, weight: 800, family: 'sans-serif' }).fill(gv('--text'));
    });
  })();
});
</script>
</body>
</html>
