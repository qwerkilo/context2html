<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨库组合 — D3 + Three.js 力导向网络</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<script src="../libs/d3.min.js"></script>
<script src="../libs/three.min.js"></script>
<script>if(typeof d3==='undefined')document.write('<script src="https://d3js.org/d3.v7.min.js"><\/script>')</script>
<script>if(typeof THREE==='undefined')document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>')</script>
<style>
:root{--bg:#faf9f7;--text:#1a1a1a;--accent:#c0392b;--surface:#f5f0eb;--radius:8px;--font:"Noto Serif CJK SC",Georgia,serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:960px;margin:0 auto;padding:2rem;-webkit-font-smoothing:antialiased}
h1{border-bottom:2px solid var(--accent);padding-bottom:.5em}
h2{margin-top:2em}
.box{background:var(--surface);border-radius:var(--radius);margin:1rem 0;padding:8px;overflow:hidden}
p{color:var(--muted);font-size:.9rem;margin:.5em 0}
</style>
</head>
<body>
<h1 class="shiny-text">D3 力导向 + Three.js 3D</h1>
<p>D3.js 计算力导向布局坐标，Three.js 渲染为可交互的 3D 球体网络。D3 处理数据逻辑，Three 负责视觉呈现。</p>

<div class="box border-glow"><div id="chart" style="width:100%;height:500px;"></div></div>

<noscript><p style="text-align:center;padding:2rem;">需要 JavaScript</p></noscript>

<script>
(function(){
  try {
    var el = document.getElementById('chart');
    if(!el) return;
    if(typeof d3 === 'undefined'){ el.innerHTML='<p style="color:red;padding:2rem;">D3.js 未加载</p>'; return; }
    if(typeof THREE === 'undefined'){ el.innerHTML='<p style="color:red;padding:2rem;">Three.js 未加载</p>'; return; }

    var w = el.clientWidth, h = 500;

    // --- Step 1: D3 力导向布局 ---
    var nodes = [
      {id:'央行',group:1},{id:'商业银行',group:1},{id:'投资银行',group:1},
      {id:'企业',group:2},{id:'居民',group:2},{id:'政府',group:2},
      {id:'股市',group:3},{id:'债市',group:3},{id:'房市',group:3},
      {id:'监管',group:4},{id:'评级',group:4},
    ];
    var links = [
      {source:'央行',target:'商业银行'},{source:'央行',target:'监管'},
      {source:'商业银行',target:'企业'},{source:'商业银行',target:'居民'},
      {source:'商业银行',target:'投资银行'},
      {source:'投资银行',target:'股市'},{source:'投资银行',target:'债市'},
      {source:'企业',target:'股市'},{source:'居民',target:'房市'},
      {source:'商业银行',target:'房市'},{source:'政府',target:'债市'},
      {source:'监管',target:'商业银行'},{source:'评级',target:'投资银行'},
      {source:'评级',target:'债市'},{source:'央行',target:'政府'},
    ];

    var sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(function(d){return d.id;}).distance(120).strength(0.4))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(0, 0))
      .stop();

    for(var k = 0; k < 150; k++) sim.tick();

    // D3 坐标缩放系数（适配 Three.js 空间）
    var scale = 1 / 35;

    // --- Step 2: Three.js 3D 渲染 ---
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f0eb);

    var camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.set(0, 3, 16);
    camera.lookAt(0, 0, 0);

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    el.innerHTML = '';
    el.appendChild(renderer.domElement);

    // 颜色按 group 区分
    var groupColors = [0x3498db, 0x2ecc71, 0xe74c3c, 0xf39c12];
    var groupLabels = ['金融中介','实体经济','市场','监管'];
    var legendEls = [];

    var meshMap = {};
    nodes.forEach(function(n, i){
      var color = groupColors[n.group - 1] || 0x999999;
      var geo = new THREE.SphereGeometry(0.5, 24, 16);
      var mat = new THREE.MeshLambertMaterial({ color: color });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(n.x * scale, n.y * scale, 0);
      mesh.userData = { label: n.id, group: n.group };
      scene.add(mesh);
      meshMap[n.id] = mesh;
    });

    // 连线
    links.forEach(function(l){
      var s = typeof l.source === 'object' ? l.source : meshMap[l.source];
      var t = typeof l.target === 'object' ? l.target : meshMap[l.target];
      if(!s || !t || !s.position || !t.position) return;
      var points = [s.position.clone(), t.position.clone()];
      var geo = new THREE.BufferGeometry().setFromPoints(points);
      var mat = new THREE.LineBasicMaterial({ color: 0xcccccc, opacity: 0.3, transparent: true });
      var line = new THREE.Line(geo, mat);
      scene.add(line);
    });

    // 标签（Canvas Sprite）
    nodes.forEach(function(n){
      var mesh = meshMap[n.id];
      if(!mesh) return;
      var canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 48;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1a1a1a';
      ctx.font = 'bold 20px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.id, 64, 24);

      var tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      var sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
      sprite.position.copy(mesh.position);
      sprite.position.y += 0.8;
      sprite.scale.set(1.6, 0.6, 1);
      scene.add(sprite);
    });

    // 光照
    var light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // 图例
    var legend = document.createElement('div');
    legend.style.cssText = 'position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,0.9);border-radius:6px;padding:8px 12px;font-size:0.78rem;display:flex;gap:12px;pointer-events:none;';
    groupColors.forEach(function(c, i){
      legend.innerHTML += '<span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#' + c.toString(16).padStart(6,'0') + ';"></span>' + groupLabels[i] + '</span>';
    });
    el.style.position = 'relative';
    el.appendChild(legend);

    // Hover tooltip
    var tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:fixed;background:rgba(0,0,0,0.85);color:#fff;padding:4px 10px;border-radius:6px;font-size:0.85rem;pointer-events:none;z-index:999;opacity:0;transition:opacity 0.15s ease;font-family:inherit;';
    document.body.appendChild(tooltip);

    var raycaster = new THREE.Raycaster();
    var mouse = new THREE.Vector2();
    var hovered = null;

    renderer.domElement.addEventListener('mousemove', function(e){
      var rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      var intersects = raycaster.intersectObjects(scene.children);
      if(intersects.length > 0){
        var obj = intersects[0].object;
        if(obj.userData && obj.userData.label){
          tooltip.textContent = obj.userData.label + ' (Group ' + obj.userData.group + ')';
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 8) + 'px';
          tooltip.style.opacity = '1';
          if(hovered && hovered !== obj) hovered.material.emissiveIntensity = 0;
          obj.material.emissive = obj.material.color;
          obj.material.emissiveIntensity = 0.3;
          hovered = obj;
          renderer.domElement.style.cursor = 'pointer';
        }
      } else {
        tooltip.style.opacity = '0';
        if(hovered){ hovered.material.emissiveIntensity = 0; hovered = null; }
        renderer.domElement.style.cursor = 'default';
      }
    });

    // 动画循环
    function animate(){ requestAnimationFrame(animate); scene.rotation.y += 0.002; renderer.render(scene, camera); }
    animate();

    window.addEventListener('resize', function(){
      w = el.clientWidth;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  } catch(e) {
    var el2 = document.getElementById('chart');
    if(el2) el2.innerHTML = '<p style="color:red;padding:2rem;text-align:center;">错误: ' + e.message + '</p>';
  }
})();
</script>
</body>
</html>
