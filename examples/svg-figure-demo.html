<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Figure 包裹 - 组件示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --radius: 8px; }
body { font-family: "Noto Serif CJK SC", Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.8; max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5em; }
p { color: #555; }

.svg-fig { margin: 1.5rem 0; text-align: center; }
.svg-fig svg { max-width: 100%; height: auto; border-radius: var(--radius, 8px); }
.svg-fig figcaption { margin-top: 0.5em; font-size: 0.82rem; color: #888; font-style: italic; }
</style>
</head>
<body>

<h1 class="shiny-text">SVG Figure 包裹 — 组件示例</h1>

<p>标准的图片/SVG 容器，带 caption 说明文字，居中排版。</p>

<figure class="svg-fig glare-hover" style="padding:1rem;border-radius:var(--radius,8px);">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
    <defs>
      <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.06"/></filter>
    </defs>
    <style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif;}</style>
    <rect width="600" height="240" fill="#faf9f7" rx="12"/>

    <g filter="url(#s)">
      <rect x="30" y="30" width="540" height="40" rx="6" fill="#2563eb"/>
      <text x="300" y="56" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">货币政策传导机制</text>
    </g>

    <g filter="url(#s)">
      <rect x="40" y="100" width="120" height="50" rx="6" fill="#d97706"/>
      <text x="100" y="120" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">央行降息</text>
      <text x="100" y="137" text-anchor="middle" fill="#fef3c7" font-size="10">政策利率↓</text>
    </g>

    <line x1="160" y1="125" x2="230" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <line x1="160" y1="125" x2="160" y2="185" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

    <g filter="url(#s)">
      <rect x="240" y="100" width="140" height="50" rx="6" fill="#2563eb"/>
      <text x="310" y="120" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">银行借贷成本↓</text>
      <text x="310" y="137" text-anchor="middle" fill="#dbeafe" font-size="10">贷款利率↓</text>
    </g>

    <g filter="url(#s)">
      <rect x="60" y="175" width="160" height="50" rx="6" fill="#2563eb"/>
      <text x="140" y="195" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">债券收益率↓</text>
      <text x="140" y="212" text-anchor="middle" fill="#dbeafe" font-size="10">资本成本降低</text>
    </g>

    <line x1="380" y1="125" x2="440" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

    <g filter="url(#s)">
      <rect x="440" y="100" width="130" height="50" rx="6" fill="#16a34a"/>
      <text x="505" y="120" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">投资消费↑</text>
      <text x="505" y="137" text-anchor="middle" fill="#bbf7d0" font-size="10">经济增长</text>
    </g>

    <defs>
      <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0L10,5L0,10Z" fill="#94a3b8"/></marker>
    </defs>
  </svg>
  <figcaption>图1：货币政策传导的三个关键环节——从央行降息到实体经济增长</figcaption>
</figure>

<p>SVG Figure 包裹是标准图片容器，适用于所有 SVG 和图片的排版。使用时在 HTML 中插入 &lt;figure class="svg-fig"&gt;&lt;svg&gt;...&lt;/svg&gt;&lt;figcaption&gt;...&lt;/figcaption&gt;&lt;/figure&gt;。</p>

</body>
</html>
