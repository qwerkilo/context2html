<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角色卡片 - 组件示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --radius: 8px; }
body { font-family: "Noto Serif CJK SC", Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.8; max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5em; }

.role-card { transition: transform 0.25s ease, box-shadow 0.25s ease; }
.role-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<h1 class="shiny-text">角色卡片 — 组件示例</h1>

<p>3×2 网格展示 6 个角色，顶栏颜色区分类型。</p>

<figure class="svg-fig">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif;}</style>
  <rect width="700" height="320" fill="#faf9f7" rx="12"/>

  <g class="glare-hover" filter="url(#s)">
    <rect x="18" y="20" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="18" y="20" width="210" height="28" rx="8" fill="#2563eb"/>
    <rect x="18" y="40" width="210" height="8" fill="#2563eb"/>
    <text x="123" y="40" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🏛️ 美联储</text>
    <text x="28" y="65" fill="#475569" font-size="11">美国的中央银行</text>
    <text x="28" y="80" fill="#475569" font-size="11">负责货币政策和金融监管</text>
    <text x="28" y="95" fill="#475569" font-size="11">危机中大幅降息+量化宽松</text>
  </g>
  <g class="glare-hover" filter="url(#s)">
    <rect x="245" y="20" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="245" y="20" width="210" height="28" rx="8" fill="#d97706"/>
    <rect x="245" y="40" width="210" height="8" fill="#d97706"/>
    <text x="350" y="40" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🏢 雷曼兄弟</text>
    <text x="255" y="65" fill="#475569" font-size="11">美国第四大投资银行</text>
    <text x="255" y="80" fill="#475569" font-size="11">过度杠杆投资次级债</text>
    <text x="255" y="95" fill="#475569" font-size="11">2008.9.15 破产引发全球危机</text>
  </g>
  <g class="glare-hover" filter="url(#s)">
    <rect x="472" y="20" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="472" y="20" width="210" height="28" rx="8" fill="#dc2626"/>
    <rect x="472" y="40" width="210" height="8" fill="#dc2626"/>
    <text x="577" y="40" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">📉 对冲基金</text>
    <text x="482" y="65" fill="#475569" font-size="11">做空次贷CDS获暴利</text>
    <text x="482" y="80" fill="#475569" font-size="11">加速市场恐慌传导</text>
    <text x="482" y="95" fill="#475569" font-size="11">保尔森基金年化回报590%</text>
  </g>
  <g class="glare-hover" filter="url(#s)">
    <rect x="18" y="130" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="18" y="130" width="210" height="28" rx="8" fill="#16a34a"/>
    <rect x="18" y="150" width="210" height="8" fill="#16a34a"/>
    <text x="123" y="150" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">💰 财政部</text>
    <text x="28" y="175" fill="#475569" font-size="11">保尔森主导TARP救助计划</text>
    <text x="28" y="190" fill="#475569" font-size="11">7000亿美元购买问题资产</text>
    <text x="28" y="205" fill="#475569" font-size="11">防止金融体系全面崩溃</text>
  </g>
  <g class="glare-hover" filter="url(#s)">
    <rect x="245" y="130" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="245" y="130" width="210" height="28" rx="8" fill="#2563eb"/>
    <rect x="245" y="150" width="210" height="8" fill="#2563eb"/>
    <text x="350" y="150" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🌍 国际货币基金</text>
    <text x="255" y="175" fill="#475569" font-size="11">向新兴市场提供紧急贷款</text>
    <text x="255" y="190" fill="#475569" font-size="11">推动全球金融监管改革</text>
    <text x="255" y="205" fill="#475569" font-size="11">协调各国经济刺激政策</text>
  </g>
  <g class="glare-hover" filter="url(#s)">
    <rect x="472" y="130" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="472" y="130" width="210" height="28" rx="8" fill="#d97706"/>
    <rect x="472" y="150" width="210" height="8" fill="#d97706"/>
    <text x="577" y="150" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🏠 房利美/房地美</text>
    <text x="482" y="175" fill="#475569" font-size="11">美国政府赞助房贷机构</text>
    <text x="482" y="190" fill="#475569" font-size="11">持有/担保5万亿房贷</text>
    <text x="482" y="205" fill="#475569" font-size="11">2008.9被政府接管</text>
  </g>
</svg>
</figure>

</body>
</html>
