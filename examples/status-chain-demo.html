<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>状态链 - 组件示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --radius: 8px; --anim-dur: 0.35s; }
body { font-family: "Noto Serif CJK SC", Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.8; max-width: 720px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5em; }

.status-chain { display: flex; justify-content: space-between; margin: 1.5rem 0; position: relative; padding: 0.5em 0; }
.status-chain::before { content: ''; position: absolute; top: 22px; left: 15%; right: 15%; height: 2px; background: #d0d0d0; z-index: 0; }
.sc-step { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; flex: 1; text-align: center; min-width: 0; }
.sc-dot { width: 28px; height: 28px; border-radius: 50%; margin-bottom: 0.4em; position: relative; background: #fff; transition: all var(--anim-dur) ease; }
.sc-step.done .sc-dot { background: var(--accent); border: 3px solid var(--accent); }
.sc-step.current .sc-dot { background: #fff; border: 3px solid var(--accent); box-shadow: 0 0 0 4px rgba(192,57,43,0.15); }
.sc-step.pending .sc-dot { background: #fff; border: 3px solid #d0d0d0; }
.sc-label { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; padding: 0 0.3em; }
.sc-status { font-size: 0.72rem; color: #94a3b8; margin-top: 0.15em; }

@media (max-width: 500px) { .status-chain { gap: 0.5em; overflow-x: auto; justify-content: flex-start; } .status-chain::before { display: none; } .sc-step { flex: 0 0 auto; min-width: 70px; } }

[data-anim] { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
[data-anim].in-view { opacity: 1; transform: translateY(0); }
</style>
</head>
<body class="grid-bg">

<h1 class="shiny-text">状态链 — 组件示例</h1>

<p>以下展示三段状态链：已完成、进行中、待办。滚动页面可见淡入动画。</p>

<div class="status-chain" data-anim="fade-up">
  <div class="sc-step done">
    <div class="sc-dot"></div>
    <div class="sc-label">泡沫积累</div>
    <div class="sc-status">2001-2006</div>
  </div>
  <div class="sc-step done">
    <div class="sc-dot"></div>
    <div class="sc-label">危机爆发</div>
    <div class="sc-status">2007-2008</div>
  </div>
  <div class="sc-step current">
    <div class="sc-dot"></div>
    <div class="sc-label">政府救助</div>
    <div class="sc-status">2008-2009</div>
  </div>
  <div class="sc-step pending">
    <div class="sc-dot"></div>
    <div class="sc-label">监管改革</div>
    <div class="sc-status">待完成</div>
  </div>
  <div class="sc-step pending">
    <div class="sc-dot"></div>
    <div class="sc-label">经济复苏</div>
    <div class="sc-status">待完成</div>
  </div>
</div>

<script>
(function(){
  var obs = new IntersectionObserver(function(es) {
    es.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('in-view'); });
  });
  document.querySelectorAll('[data-anim]').forEach(function(el) { obs.observe(el); });
})();
</script>
</body>
</html>
