<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D3.js 数据可视化 — 示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<!-- 优先本地文件，CDN 作为 fallback -->
<script src="../libs/d3.min.js"></script>
<script>if(typeof d3==='undefined'){document.write('<script src="https://d3js.org/d3.v7.min.js"><\/script>')}</script>
<script src="../libs/d3-sankey.min.js"></script>
<script>if(typeof d3.sankey==='undefined'){document.write('<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"><\/script>')}</script>
<style>
:root { --bg: #faf9f7; --text: #1a1a1a; --accent: #c0392b; --surface: #f5f0eb; --border: #ddd8d0; --muted: #888; --radius: 8px; }
body { font-family: "Noto Serif CJK SC",Georgia,serif; background: var(--bg); color: var(--text); max-width: 800px; margin: 0 auto; padding: 2rem; -webkit-font-smoothing: antialiased; }
h1 { text-wrap: pretty; border-bottom: 2px solid var(--accent); padding-bottom: 0.5em; }
h2 { margin-top: 2em; text-wrap: pretty; }
.chart-box { background: var(--surface); border-radius: var(--radius); margin: 1rem 0; padding: 8px; position: relative; overflow: hidden; }
.force-node { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
.force-node:hover { stroke-width: 3px; }
.force-label { font-size: 11px; fill: var(--text); pointer-events: none; font-family: inherit; }
.force-link { stroke: var(--border); stroke-width: 1px; stroke-opacity: 0.5; }
.sunburst-arc { stroke: #fff; stroke-width: 1.5px; cursor: pointer; transition: opacity 0.2s ease; }
.sunburst-arc:hover { opacity: 0.8; }
.sunburst-label { text-shadow: 0 1px 3px rgba(0,0,0,0.5); pointer-events: none; }
</style>
</head>
<body>

<h1 class="shiny-text">D3.js 数据可视化</h1>
<p>力导向图、旭日图、桑基图演示（需要 JavaScript）。D3.js 搭配 CSS 变量自动适配主题色。</p>

<h2>27a — 力导向图</h2>
<p>展示实体间关系网络，可拖拽交互。</p>
<div class="chart-box border-glow"><div id="chart-force" style="width:100%;height:420px;"></div></div>

<h2>27b — 旭日图</h2>
<p>展示多层占比结构。鼠标悬停查看数值。</p>
<div class="chart-box border-glow"><div id="chart-sunburst" style="width:100%;height:380px;"></div></div>

<h2>27c — 桑基图</h2>
<p>展示流量流向与转化路径。</p>
<div class="chart-box border-glow"><div id="chart-sankey" style="width:100%;height:350px;"></div></div>

<div class="d3-tip" id="d3-tip"></div>
<noscript><p style="text-align:center;color:var(--muted);padding:2rem;">图表加载需要 JavaScript</p></noscript>

<script>
/* ===== 27a — 力导向图 ===== */
(function(){
  var el = document.getElementById('chart-force');
  if (!el || typeof d3 === 'undefined') return;
  var w = el.clientWidth || 760, h = 420;
  var svg = d3.select(el).append('svg').attr('width',w).attr('height',h);

  var nodes = [
    { id: '金融', label: '金融', group: 1, r: 22 },
    { id: '地产', label: '地产', group: 1, r: 18 },
    { id: '科技', label: '科技', group: 2, r: 20 },
    { id: '消费', label: '消费', group: 2, r: 15 },
    { id: '能源', label: '能源', group: 3, r: 16 },
  ];
  var links = [
    { source: '金融', target: '地产' },
    { source: '金融', target: '科技' },
    { source: '地产', target: '消费' },
    { source: '科技', target: '消费' },
    { source: '科技', target: '能源' },
    { source: '消费', target: '能源' },
  ];

  var colors = d3.scaleOrdinal(d3.schemeTableau10);
  var sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d){return d.id;}).distance(110))
    .force('charge', d3.forceManyBody().strength(-180))
    .force('center', d3.forceCenter(w/2, h/2));

  var link = svg.selectAll('.force-link').data(links).join('line').attr('class','force-link');
  var node = svg.selectAll('.force-node').data(nodes).join('circle')
    .attr('class','force-node').attr('r',function(d){return d.r;})
    .attr('fill',function(d){return colors(d.group);})
    .call(d3.drag().on('start',function(e,d){if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',function(e,d){d.fx=e.x;d.fy=e.y;})
      .on('end',function(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  var tipForce = document.getElementById('d3-tip');
  node.on('mouseover',function(e,d){ tipForce.textContent = d.label; tipForce.style.left = (e.pageX+12)+'px'; tipForce.style.top = (e.pageY-8)+'px'; tipForce.classList.add('visible'); })
      .on('mousemove',function(e){ tipForce.style.left = (e.pageX+12)+'px'; tipForce.style.top = (e.pageY-8)+'px'; })
      .on('mouseout',function(){ tipForce.classList.remove('visible'); });
  var label = svg.selectAll('.force-label').data(nodes).join('text')
    .attr('class','force-label').text(function(d){return d.label;})
    .attr('text-anchor','middle').attr('dy','0.35em');

  sim.on('tick',function(){
    link.attr('x1',function(d){return d.source.x;}).attr('y1',function(d){return d.source.y;})
      .attr('x2',function(d){return d.target.x;}).attr('y2',function(d){return d.target.y;});
    node.attr('cx',function(d){return d.x;}).attr('cy',function(d){return d.y;});
    label.attr('x',function(d){return d.x;}).attr('y',function(d){return d.y;});
  });
})();

/* ===== 27b — 旭日图 ===== */
(function(){
  var el = document.getElementById('chart-sunburst');
  if (!el || typeof d3 === 'undefined') return;
  var w = el.clientWidth || 760, h = 380, cx = w/2, cy = h/2, r = Math.min(w,h)/2 - 8;

  var data = {
    name: 'root',
    children: [
      { name: '产品 A', value: 45, children: [{name:'A1',value:25},{name:'A2',value:20}] },
      { name: '产品 B', value: 30, children: [{name:'B1',value:18},{name:'B2',value:12}] },
      { name: '产品 C', value: 25, children: [{name:'C1',value:15},{name:'C2',value:10}] },
    ]
  };

  var root = d3.hierarchy(data).sum(function(d){return d.value;});
  var arc = d3.arc().startAngle(function(d){return d.x0;}).endAngle(function(d){return d.x1;})
    .innerRadius(function(d){return d.y0;}).outerRadius(function(d){return d.y1;});
  var color = d3.scaleOrdinal(d3.schemeTableau10);
  var svg = d3.select(el).append('svg').attr('width',w).attr('height',h)
    .append('g').attr('transform','translate('+cx+','+cy+')');

  var partition = d3.partition().size([2 * Math.PI, r]);
  partition(root);

  svg.selectAll('path').data(root.descendants()).join('path')
    .attr('class','sunburst-arc').attr('d',arc)
    .attr('fill',function(d){ while(d.depth>1)d=d.parent; return color(d.data.name); });

  // 直接显示数值文字标签（始终可见）
  var midAngle = function(d){ return d.x0 + (d.x1 - d.x0) / 2; };
  var midRadius = function(d){ return d.y0 + (d.y1 - d.y0) / 2; };
  svg.selectAll('.sunburst-label').data(root.descendants().filter(function(d){return d.depth>0;})).join('text')
    .attr('class','sunburst-label').attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('transform',function(d){ var a=midAngle(d), r=midRadius(d); return 'rotate('+(a*180/Math.PI-90)+') translate('+r+',0) rotate('+(-(a*180/Math.PI-90))+')'; })
    .attr('font-size',function(d){ return d.depth===1?'13px':'11px'; })
    .attr('fill','#fff').attr('font-weight',function(d){return d.depth===1?'700':'400';})
    .style('text-shadow','0 1px 2px rgba(0,0,0,0.5)')
    .attr('pointer-events','none')
    .text(function(d){ return d.data.name + ' ' + d.value + '%'; });
})();

/* ===== 27c — 桑基图 ===== */
(function(){
  var el = document.getElementById('chart-sankey');
  if (!el || typeof d3 === 'undefined' || typeof d3.sankey === 'undefined') return;
  var w = el.clientWidth || 760, h = 350;

  var data = {
    nodes: [{name:'访客'},{name:'首页'},{name:'搜索'},{name:'推荐'},{name:'商品页'},{name:'下单'},{name:'支付'}],
    links: [
      {source:0,target:1,value:100},
      {source:1,target:2,value:60},{source:1,target:3,value:40},
      {source:2,target:4,value:35},{source:3,target:4,value:30},
      {source:4,target:5,value:40},{source:5,target:6,value:32}
    ]
  };

  var sankey = d3.sankey().nodeWidth(22).nodePadding(14).extent([[10,10],[w-10,h-10]]);
  var {nodes,links} = sankey({nodes:data.nodes.map(function(d){return Object.assign({},d);}),links:data.links.map(function(d){return Object.assign({},d);})});
  var color = d3.scaleOrdinal(d3.schemeTableau10);
  var svg = d3.select(el).append('svg').attr('width',w).attr('height',h);

  svg.selectAll('.sankey-link').data(links).join('path')
    .attr('d',d3.sankeyLinkHorizontal()).attr('fill','none')
    .attr('stroke',function(d){return color(d.source.index);}).attr('stroke-width',function(d){return Math.max(1,d.width);}).attr('stroke-opacity',0.35);
  var tipSankey = document.getElementById('d3-tip');
  svg.selectAll('.sankey-node').data(nodes).join('rect')
    .attr('x',function(d){return d.x0;}).attr('y',function(d){return d.y0;})
    .attr('width',function(d){return d.x1-d.x0;}).attr('height',function(d){return d.y1-d.y0;})
    .attr('fill',function(d){return color(d.index);}).attr('stroke','#fff')
    .on('mouseover',function(e,d){ tipSankey.textContent = d.name; tipSankey.style.left = (e.pageX+12)+'px'; tipSankey.style.top = (e.pageY-8)+'px'; tipSankey.classList.add('visible'); })
    .on('mousemove',function(e){ tipSankey.style.left = (e.pageX+12)+'px'; tipSankey.style.top = (e.pageY-8)+'px'; })
    .on('mouseout',function(){ tipSankey.classList.remove('visible'); });
  svg.selectAll('.sankey-label').data(nodes).join('text')
    .attr('x',function(d){return d.x0-6;}).attr('y',function(d){return (d.y0+d.y1)/2;})
    .attr('dy','0.35em').attr('text-anchor','end').attr('font-size','12px')
    .text(function(d){return d.name;});
})();
</script>
</body>
</html>
