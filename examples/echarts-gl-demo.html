<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECharts GL — 3D 可视化示例</title>
<link rel="stylesheet" href="../libs/magicui-effects.css">
<script src="../libs/echarts.min.js"></script>
<script src="../libs/echarts-gl.min.js"></script>
<style>
:root{--bg:#faf9f7;--text:#1a1a1a;--accent:#c0392b;--surface:#f5f0eb;--radius:8px;--font:"Noto Serif CJK SC",Georgia,serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:960px;margin:0 auto;padding:2rem;-webkit-font-smoothing:antialiased}
h1{border-bottom:2px solid var(--accent);padding-bottom:.5em}
h2{margin-top:2em}
.box{background:var(--surface);border-radius:var(--radius);margin:1rem 0;padding:8px;overflow:hidden}
p{color:var(--muted);font-size:.9rem;margin:.5em 0}
.err{display:none;padding:1.5rem;text-align:center;color:#dc2626;background:#fef2f2;border-radius:6px}
</style>
</head>
<body>
<h1 class="shiny-text">ECharts GL — 3D 可视化</h1>
<p>ECharts GL 扩展的 3D 图表，基于 WebGL 渲染（file:// 协议兼容）。</p>

<h2>3D 柱状图</h2>
<p>三维空间数据对比，高度 + 颜色双维度编码。</p>
<div class="box border-glow"><div id="bar3d" style="width:100%;height:450px;"></div></div>

<h2>3D 散点图</h2>
<p>三维空间分布，支持自动旋转。</p>
<div class="box border-glow"><div id="scatter3d" style="width:100%;height:450px;"></div></div>

<noscript><p style="text-align:center;padding:2rem;">需要 JavaScript</p></noscript>

<script>
(function(){
  try {
    if(typeof echarts === 'undefined'){ document.querySelector('.box').innerHTML = '<p style="padding:2rem;text-align:center;color:#c0392b;">ECharts 未加载</p>'; return; }

    /* ===== 3D 柱状图 ===== */
    (function(){
      var el = document.getElementById('bar3d');
      if(!el) return;
      var chart = echarts.init(el);

      var categories = ['一月','二月','三月','四月','五月'];
      var years = ['2022','2023','2024'];
      var colors = ['#e74c3c','#3498db','#2ecc71'];

      var data = [];
      years.forEach(function(y, yi){
        categories.forEach(function(c, ci){
          data.push([ci, yi, Math.round(10 + Math.random() * 40)]);
        });
      });

      chart.setOption({
        tooltip: { trigger: 'item', formatter: function(p){ return p.data[0]+' / '+p.data[1]+': <b>'+p.data[2]+'</b>'; } },
        grid3D: {
          viewControl: { autoRotate: true, autoRotateSpeed: 6, distance: 150 },
          boxWidth: 80, boxHeight: 80, boxDepth: 80,
        },
        xAxis3D: { type: 'category', data: categories, axisLabel: { fontSize: 11 } },
        yAxis3D: { type: 'category', data: years, axisLabel: { fontSize: 11 } },
        zAxis3D: { type: 'value', max: 60 },
        series: [{
          type: 'bar3D',
          data: data,
          shading: 'lambert',
          itemStyle: { opacity: 0.85 },
          label: { show: false },
          emphasis: { itemStyle: { opacity: 1 } }
        }]
      });

      window.addEventListener('resize', function(){ chart.resize(); });
    })();

    /* ===== 3D 散点图 ===== */
    (function(){
      var el = document.getElementById('scatter3d');
      if(!el) return;
      var chart = echarts.init(el);

      var data = [];
      for(var i = 0; i < 200; i++){
        var x = (Math.random() - 0.5) * 100;
        var y = (Math.random() - 0.5) * 100;
        var z = (Math.random() - 0.5) * 100;
        var cluster = Math.floor(Math.random() * 3);
        data.push({ value: [x, y, z], cluster: cluster });
      }

      var clusterColors = ['#e74c3c','#3498db','#2ecc71'];

      chart.setOption({
        tooltip: { trigger: 'item', formatter: function(p){ return '('+p.data[0].toFixed(1)+', '+p.data[1].toFixed(1)+', '+p.data[2].toFixed(1)+')'; } },
        grid3D: {
          viewControl: { autoRotate: true, autoRotateSpeed: 4, distance: 200 },
          boxWidth: 100, boxHeight: 100, boxDepth: 100,
        },
        xAxis3D: { type: 'value' },
        yAxis3D: { type: 'value' },
        zAxis3D: { type: 'value' },
        series: [{
          type: 'scatter3D',
          data: data,
          symbolSize: 6,
          itemStyle: {
            color: function(p){ return clusterColors[p.data.cluster]; },
            opacity: 0.8
          }
        }]
      });

      window.addEventListener('resize', function(){ chart.resize(); });
    })();

  } catch(e) { console.error('ECharts GL error:', e); }
})();
</script>
</body>
</html>
